<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ error_title }}</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Sarabun", sans-serif;
      background: radial-gradient(circle at 10% 10%, #fce7d8, #f7f3ea 50%, #e9eef6);
      color: #13233a;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(19, 35, 58, 0.12);
      padding: 24px;
    }
    h1 { margin-top: 0; }
    a {
      color: #0a8f8a;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>{{ error_title }}</h1>
    <p>{{ error_message }}</p>
    <p><a href="/">กลับไปหน้า Dashboard</a></p>
  </section>
</body>
</html>
